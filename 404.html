<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect: encode the path and redirect to index.html
    sessionStorage.redirect = location.href;
    window.location.replace(
      location.protocol + '//' + location.host +
      location.pathname.split('/').slice(0, 2).join('/') + '/'
    );
  </script>
</head>
<body></body>
</html>
